<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samuel Terán | WEB </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #ffffff;
        }
        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--accent-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        canvas {
            display: block;
            outline: none;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem;
            padding-left: calc(3rem + 100px); 
            z-index: 10;
        }
        
        @media (max-width: 768px) {
            .ui-layer { 
                padding-left: 1.5rem; 
                padding-right: 1.5rem;
                padding-top: 1.5rem;
                justify-content: space-between;
            }
            h1 {
                font-size: 3.5rem !important; 
                line-height: 1 !important;
            }
            .description {
                font-size: 1rem !important;
                max-width: 100% !important;
            }
            .profile-img {
                width: 50px !important;
                height: 50px !important;
                margin-bottom: 1.5rem !important;
            }
        }

        .interactive {
            pointer-events: auto;
            cursor: pointer;
        }
        .menu-btn {
            font-weight: 300;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }
        .menu-btn:hover {
            border-bottom: 1px solid white;
            opacity: 0.7;
        }
        .profile-img {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            margin-bottom: 2rem;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.15);
            background-color: #1a1a1a;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%) contrast(110%);
        }
        h1 {
            font-weight: 200;
            letter-spacing: -2px;
            line-height: 0.9;
        }
        .description {
            font-weight: 200;
            letter-spacing: 0.5px;
            color: #999;
        }

        /* Estilos del Contador */
        .visitor-counter {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-top: 2rem;
        }
        #count-number {
            color: rgba(255,255,255,0.8);
            font-weight: 400;
        }

        .fade-in {
            animation: fadeIn 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="canvas-container" class="fixed inset-0"></div>

    <div class="ui-layer">
        <div class="flex justify-end items-start w-full">
            <div class="menu-btn interactive">Menu</div>
        </div>

        <div class="max-w-xl mb-12 fade-in">
            <div class="profile-img interactive">
                <img src="objeto3d/perfil.jpg" alt="Samuel Terán" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=Samuel'">
            </div>
            <h1 class="text-7xl mb-6">Samuel <br>Terán</h1>
            <p class="description text-lg leading-relaxed max-w-sm">
                Hoy tras tu pantalla, mañana con unas cervezas en tu cama. <br>
                <span class="font-inherit">Ingeniero electromecánico,</span> no se sabe qué hago pero se oye chido.
            </p>
            
            <!-- CONTADOR DE VISITAS -->
            <div class="visitor-counter">
                VISITAS AL SITIO: <span id="count-number">...</span>
            </div>
        </div>
        <div></div>
    </div>

    <script>
        // Lógica del Contador de Visitas (Actualizada con CounterAPI.dev)
        async function getVisits() {
            const countElement = document.getElementById('count-number');
            try {
                // Usamos counterapi.dev que es más estable
                // 'samuelteran' es tu espacio y 'homepage' es la clave del contador
                const response = await fetch(`https://api.counterapi.dev/v1/samuelteran/homepage/up`);
                const data = await response.json();
                
                if (data && data.count) {
                    countElement.innerText = data.count.toLocaleString();
                }
            } catch (error) {
                console.error("Error cargando contador:", error);
                countElement.innerText = "ONLINE"; // En lugar de un número falso, ponemos un estado
            }
        }

        let scene, camera, renderer, stars;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        
        let mainObject = {
            mesh: null,
            pos: { x: 1.2, y: 0 },
            vel: { x: 0.003, y: 0.003 },
            radius: 0.9, 
            isMain: true
        };

        let cans = [];
        const availableCans = ['lata1.glb', 'lata2.glb', 'lata3.glb', 'lata4.glb'];
        const loader = new THREE.GLTFLoader();
        
        const container = document.getElementById('canvas-container');

        function init() {
            getVisits(); // Llamar al contador al iniciar

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const light1 = new THREE.DirectionalLight(0xffffff, 1.2);
            light1.position.set(2, 2, 5);
            scene.add(light1);

            setupStars();

            loader.load('objeto3d/modelo.glb', (gltf) => {
                mainObject.mesh = gltf.scene;
                const box = new THREE.Box3().setFromObject(mainObject.mesh);
                const size = new THREE.Vector3();
                box.getSize(size);
                const center = new THREE.Vector3();
                box.getCenter(center);
                mainObject.mesh.position.sub(center); 
                const baseScale = 1.5;
                mainObject.mesh.scale.set(baseScale, baseScale, baseScale);
                mainObject.radius = (Math.max(size.x, size.y, size.z) / 2) * baseScale * 0.85; 
                scene.add(mainObject.mesh);
                applyResponsiveScale();
            }, undefined, () => setupPlaceholder());

            spawnCan();
            setTimeout(spawnCan, 2500);

            window.addEventListener('mousedown', () => isDragging = true);
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('touchstart', (e) => { 
                isDragging = true; 
                previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY }; 
            });
            window.addEventListener('touchend', () => isDragging = false);
            window.addEventListener('touchmove', (e) => handleMouseMove(e.touches[0]));

            animate();
        }

        function setupStars() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 2000;
            const posArray = new Float32Array(starsCount * 3);
            for(let i = 0; i < starsCount * 3; i++) posArray[i] = (Math.random() - 0.5) * 20;
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            stars = new THREE.Points(starsGeometry, new THREE.PointsMaterial({
                size: 0.015, color: 0xffffff, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending
            }));
            scene.add(stars);
        }

        function setupObject(obj, scale, isCan = true) {
            const box = new THREE.Box3().setFromObject(obj);
            const center = box.getCenter(new THREE.Vector3());
            const size = new THREE.Vector3();
            box.getSize(size);
            obj.position.sub(center); 
            obj.scale.set(scale, scale, scale);
            return (Math.max(size.x, size.y, size.z) / 2) * scale;
        }

        function setupPlaceholder() {
            if(mainObject.mesh) return;
            const geometry = new THREE.IcosahedronGeometry(1.2, 0);
            mainObject.mesh = new THREE.Mesh(geometry, new THREE.MeshPhysicalMaterial({ color: 0xffffff, metalness: 0.9 }));
            scene.add(mainObject.mesh);
            mainObject.radius = 1.2;
            applyResponsiveScale();
        }

        function spawnCan() {
            if (cans.length >= 4) return;
            const randomFile = availableCans[Math.floor(Math.random() * availableCans.length)];
            const lifespan = Math.random() > 0.5 ? 10000 : 20000; 

            loader.load('objeto3d/' + randomFile, (gltf) => {
                const canMesh = gltf.scene;
                const scale = window.innerWidth <= 768 ? 0.4 : 0.8;
                const calculatedRadius = setupObject(canMesh, scale);
                
                const edge = Math.floor(Math.random() * 4);
                let startX, startY, velX, velY;
                const margin = 5;
                switch(edge) {
                    case 0: startX = -margin; startY = (Math.random() - 0.5) * margin; velX = 0.005 + Math.random() * 0.005; velY = (Math.random() - 0.5) * 0.01; break;
                    case 1: startX = margin; startY = (Math.random() - 0.5) * margin; velX = -0.005 - Math.random() * 0.005; velY = (Math.random() - 0.5) * 0.01; break;
                    case 2: startX = (Math.random() - 0.5) * margin; startY = margin; velX = (Math.random() - 0.5) * 0.01; velY = -0.005 - Math.random() * 0.005; break;
                    case 3: startX = (Math.random() - 0.5) * margin; startY = -margin; velX = (Math.random() - 0.5) * 0.01; velY = 0.005 + Math.random() * 0.005; break;
                }
                cans.push({
                    mesh: canMesh,
                    pos: { x: startX, y: startY },
                    vel: { x: velX, y: velY },
                    radius: calculatedRadius * 0.9,
                    birthTime: Date.now(),
                    lifespan: lifespan,
                    isDying: false,
                    isMain: false
                });
                scene.add(canMesh);
            });
        }

        function applyResponsiveScale() {
            if (!mainObject.mesh) return;
            const isMobile = window.innerWidth <= 768;
            const scale = isMobile ? 0.75 : 1.5; 
            mainObject.mesh.scale.set(scale, scale, scale);
            mainObject.pos.x = isMobile ? 0 : 1.2;
            const box = new THREE.Box3().setFromObject(mainObject.mesh);
            const size = new THREE.Vector3();
            box.getSize(size);
            mainObject.radius = (Math.max(size.x, size.y, size.z) / 2) * 0.85;
        }

        function handleMouseMove(e) {
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            const deltaMove = {
                x: clientX - (previousMousePosition.x || clientX),
                y: clientY - (previousMousePosition.y || clientY)
            };
            if (isDragging && mainObject.mesh) {
                const deltaRotationQuaternion = new THREE.Quaternion()
                    .setFromEuler(new THREE.Euler(
                        deltaMove.y * (Math.PI / 180) * 0.5,
                        deltaMove.x * (Math.PI / 180) * 0.5,
                        0, 'XYZ'
                    ));
                mainObject.mesh.quaternion.multiplyQuaternions(deltaRotationQuaternion, mainObject.mesh.quaternion);
                mainObject.vel.x = deltaMove.x * 0.0025;
                mainObject.vel.y = -deltaMove.y * 0.0025;
            }
            previousMousePosition = { x: clientX, y: clientY };
        }

        function resolveCollision(a, b) {
            const dx = b.pos.x - a.pos.x;
            const dy = b.pos.y - a.pos.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const minDistance = a.radius + b.radius;

            if (distance < minDistance) {
                const nx = dx / (distance || 1);
                const ny = dy / (distance || 1);
                const overlap = minDistance - distance;
                const separationFactor = 1.1; 
                
                if (a.isMain || b.isMain) {
                    const can = a.isMain ? b : a;
                    const sign = (a.isMain) ? 1 : -1;
                    can.pos.x += nx * overlap * sign * separationFactor;
                    can.pos.y += ny * overlap * sign * separationFactor;
                    const dot = can.vel.x * nx + can.vel.y * ny;
                    if ((a.isMain && dot < 0) || (b.isMain && dot > 0)) {
                        can.vel.x -= 2 * dot * nx;
                        can.vel.y -= 2 * dot * ny;
                    }
                } else {
                    a.pos.x -= nx * overlap * 0.5 * separationFactor;
                    a.pos.y -= ny * overlap * 0.5 * separationFactor;
                    b.pos.x += nx * overlap * 0.5 * separationFactor;
                    b.pos.y += ny * overlap * 0.5 * separationFactor;
                    const dotA = a.vel.x * nx + a.vel.y * ny;
                    const dotB = b.vel.x * nx + b.vel.y * ny;
                    a.vel.x -= (dotA - dotB) * nx;
                    a.vel.y -= (dotA - dotB) * ny;
                    b.vel.x -= (dotB - dotA) * nx;
                    b.vel.y -= (dotB - dotA) * ny;
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const now = Date.now();
            if(stars) stars.rotation.y += 0.0002;

            if (mainObject.mesh) {
                if (!isDragging) {
                    mainObject.mesh.rotation.y += 0.003;
                    mainObject.pos.x += mainObject.vel.x;
                    mainObject.pos.y += mainObject.vel.y;
                    const isMobile = window.innerWidth <= 768;
                    const xLimit = isMobile ? (window.innerWidth / 1000) * 1.5 : (window.innerWidth / 1000) * 2.0; 
                    const yLimit = isMobile ? (window.innerHeight / 1000) * 2.0 : (window.innerHeight / 1000) * 1.6;
                    
                    if (Math.abs(mainObject.pos.x) > xLimit) {
                        mainObject.vel.x *= -0.85;
                        mainObject.pos.x = Math.sign(mainObject.pos.x) * xLimit;
                    }
                    if (Math.abs(mainObject.pos.y) > yLimit) {
                        mainObject.vel.y *= -0.85;
                        mainObject.pos.y = Math.sign(mainObject.pos.y) * yLimit;
                    }
                    mainObject.mesh.position.x = mainObject.pos.x;
                    mainObject.mesh.position.y = mainObject.pos.y;
                    mainObject.vel.x *= 0.995;
                    mainObject.vel.y *= 0.995;
                }
            }

            for (let i = cans.length - 1; i >= 0; i--) {
                const can = cans[i];
                can.pos.x += can.vel.x;
                can.pos.y += can.vel.y;
                can.mesh.rotation.x += 0.01;
                can.mesh.rotation.z += 0.01;
                const isMobile = window.innerWidth <= 768;
                const xLimit = isMobile ? (window.innerWidth / 1000) * 1.8 : (window.innerWidth / 1000) * 2.5; 
                const yLimit = isMobile ? (window.innerHeight / 1000) * 2.8 : (window.innerHeight / 1000) * 2.0;

                if (now - can.birthTime > can.lifespan) can.isDying = true;

                if (!can.isDying) {
                    if (Math.abs(can.pos.x) > xLimit) { can.vel.x *= -1; can.pos.x = Math.sign(can.pos.x) * xLimit; }
                    if (Math.abs(can.pos.y) > yLimit) { can.vel.y *= -1; can.pos.y = Math.sign(can.pos.y) * yLimit; }
                    if (mainObject.mesh) resolveCollision(can, mainObject);
                    for (let j = i - 1; j >= 0; j--) resolveCollision(can, cans[j]);
                } else {
                    if (Math.abs(can.pos.x) > xLimit + 4 || Math.abs(can.pos.y) > yLimit + 4) {
                        scene.remove(can.mesh);
                        cans.splice(i, 1);
                        spawnCan();
                    }
                }
                can.mesh.position.x = can.pos.x;
                can.mesh.position.y = can.pos.y;
            }
            if (cans.length < 2) spawnCan();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            applyResponsiveScale();
        });

        init();
    </script>
</body>
</html>
