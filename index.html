<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samuel Terán | WEB </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #ffffff;
        }
        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--accent-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        canvas {
            display: block;
            outline: none;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem;
            /* Margen izquierdo para desktop */
            padding-left: calc(3rem + 100px); 
            z-index: 10;
        }
        
        /* Ajustes específicos para Celular */
        @media (max-width: 768px) {
            .ui-layer { 
                padding-left: 1.5rem; 
                padding-right: 1.5rem;
                padding-top: 1.5rem; /* Reducido para que el menú suba */
                justify-content: space-between; /* Mantiene el menú arriba y el texto abajo */
            }
            h1 {
                font-size: 3.5rem !important; 
                line-height: 1 !important;
            }
            .description {
                font-size: 1rem !important;
                max-width: 100% !important;
            }
            .profile-img {
                width: 50px !important;
                height: 50px !important;
                margin-bottom: 1.5rem !important;
            }
            .header-mobile {
                margin-top: 0.5rem;
            }
        }

        .interactive {
            pointer-events: auto;
            cursor: pointer;
        }
        .menu-btn {
            font-weight: 300;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }
        .menu-btn:hover {
            border-bottom: 1px solid white;
            opacity: 0.7;
        }
        .profile-img {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            margin-bottom: 2rem;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.15);
            background-color: #1a1a1a;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%) contrast(110%);
        }
        h1 {
            font-weight: 200;
            letter-spacing: -2px;
            line-height: 0.9;
        }
        .description {
            font-weight: 200;
            letter-spacing: 0.5px;
            color: #999;
        }
        .fade-in {
            animation: fadeIn 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="canvas-container" class="fixed inset-0"></div>

    <div class="ui-layer">
        <!-- Header ajustado para subir el menú en móvil -->
        <div class="flex justify-end items-start w-full header-mobile">
            <div class="menu-btn interactive">Menu</div>
        </div>

        <div class="max-w-xl mb-12 fade-in">
            <div class="profile-img interactive">
                <img src="objeto3d/perfil.jpg" alt="Samuel Terán" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=Samuel'">
            </div>
            <h1 class="text-7xl mb-6">Samuel <br>Terán</h1>
            <p class="description text-lg leading-relaxed max-w-sm">
                Hoy tras tu pantalla, mañana con unas cervezas en la playa. <br>
                <span class="text-white font-light">Ingeniero electromecánico,</span> no se sabe qué hago pero se oye chido.
            </p>
        </div>
        <div></div>
    </div>

    <script>
        let scene, camera, renderer, model, stars;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let position = { x: 1.2, y: 0 };
        let posVelocity = { x: 0.003, y: 0.003 };
        
        const container = document.getElementById('canvas-container');

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const light1 = new THREE.DirectionalLight(0xffffff, 1.2);
            light1.position.set(2, 2, 5);
            scene.add(light1);

            // Estrellas
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 2000;
            const posArray = new Float32Array(starsCount * 3);
            for(let i = 0; i < starsCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 20;
            }
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const starsMaterial = new THREE.PointsMaterial({
                size: 0.015,
                color: 0xffffff,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });
            stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);

            // Carga del modelo
            const loader = new THREE.GLTFLoader();
            loader.load('objeto3d/modelo.glb', (gltf) => {
                if(model) scene.remove(model);
                model = gltf.scene;
                
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center); 
                
                applyResponsiveScale();
                scene.add(model);
            }, undefined, (error) => {
                setupPlaceholder();
            });

            function setupPlaceholder() {
                if(model) return;
                const geometry = new THREE.IcosahedronGeometry(1.2, 0);
                const material = new THREE.MeshPhysicalMaterial({ 
                    color: 0xffffff, metalness: 0.9, roughness: 0.1, reflectivity: 1, clearcoat: 1
                });
                model = new THREE.Mesh(geometry, material);
                applyResponsiveScale();
                scene.add(model);
            }

            window.addEventListener('mousedown', () => isDragging = true);
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('touchstart', (e) => { 
                isDragging = true; 
                previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY }; 
            });
            window.addEventListener('touchend', () => isDragging = false);
            window.addEventListener('touchmove', (e) => handleMouseMove(e.touches[0]));

            animate();
        }

        function applyResponsiveScale() {
            if (!model) return;
            const isMobile = window.innerWidth <= 768;
            const scale = isMobile ? 0.75 : 1.5; 
            model.scale.set(scale, scale, scale);
            
            position.x = isMobile ? 0 : 1.2;
            position.y = isMobile ? -0.5 : 0; 
        }

        function handleMouseMove(e) {
            const deltaMove = {
                x: e.clientX - previousMousePosition.x,
                y: e.clientY - previousMousePosition.y
            };

            if (isDragging && model) {
                const deltaRotationQuaternion = new THREE.Quaternion()
                    .setFromEuler(new THREE.Euler(
                        deltaMove.y * (Math.PI / 180) * 0.5,
                        deltaMove.x * (Math.PI / 180) * 0.5,
                        0, 'XYZ'
                    ));
                model.quaternion.multiplyQuaternions(deltaRotationQuaternion, model.quaternion);
                posVelocity.x = deltaMove.x * 0.0025;
                posVelocity.y = -deltaMove.y * 0.0025;
            }
            previousMousePosition = { x: (e.clientX || e.pageX), y: (e.clientY || e.pageY) };
        }

        function animate() {
            requestAnimationFrame(animate);
            if(stars) {
                stars.rotation.y += 0.0002;
                stars.rotation.x += 0.0001;
            }
            if (model) {
                if (!isDragging) {
                    model.rotation.y += 0.003;
                    position.x += posVelocity.x;
                    position.y += posVelocity.y;

                    const isMobile = window.innerWidth <= 768;
                    const xLimit = isMobile ? (window.innerWidth / 1000) * 1.5 : (window.innerWidth / 1000) * 2.0; 
                    const yLimit = isMobile ? (window.innerHeight / 1000) * 2.0 : (window.innerHeight / 1000) * 1.6;

                    if (Math.abs(position.x) > xLimit) {
                        posVelocity.x *= -0.85;
                        position.x = Math.sign(position.x) * xLimit;
                    }
                    if (Math.abs(position.y) > yLimit) {
                        posVelocity.y *= -0.85;
                        position.y = Math.sign(position.y) * yLimit;
                    }

                    model.position.x = position.x;
                    model.position.y = position.y;
                    posVelocity.x *= 0.995;
                    posVelocity.y *= 0.995;
                    if(Math.abs(posVelocity.x) < 0.0005) posVelocity.x = 0.0005;
                }
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            applyResponsiveScale();
        });

        init();
    </script>
</body>
</html>
